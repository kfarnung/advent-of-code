name: Advent of Code 2017

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/2017.yml
      - 2017/**
  pull_request:
    paths:
      - .github/workflows/2017.yml
      - 2017/**

jobs:
  build-2017:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "2017"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          submodules: true

      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - run: npm ci

      - run: npm test
        env:
          CI: true
