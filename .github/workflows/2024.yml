name: Advent of Code 2024

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/2024.yml
      - 2024/**
  pull_request:
    paths:
      - .github/workflows/2024.yml
      - 2024/**

jobs:
  build-2024:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "2024"

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT }}
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version: ^1.25

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v ./...
